name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pre-Commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run Pre-Commit
        run: pre-commit run --all-files
