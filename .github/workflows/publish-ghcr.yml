name: Publish GHCR Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/dewab/docker-igir
  PLATFORM: linux/amd64

jobs:
  build-scan-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pre-Commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run Pre-Commit
        run: pre-commit run --all-files

      - name: Resolve Igir Version
        id: version
        run: |
          version="$(sed -n 's/^ARG IGIR_VERSION=//p' Dockerfile | head -n1)"
          test -n "$version"
          echo "igir_version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve Build Metadata
        id: buildmeta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Vendor Igir Dependencies
        run: |
          mkdir -p .vendor/igir-linux-x64
          npm install \
            --prefix .vendor/igir-linux-x64 \
            --omit=dev \
            --cpu=x64 \
            --os=linux \
            --libc=glibc \
            "igir@${{ steps.version.outputs.igir_version }}"

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.igir_version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Image For Validation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM }}
          load: true
          tags: local/igir-ci:${{ steps.version.outputs.igir_version }}
          build-args: |
            BUILD_DATE=${{ steps.buildmeta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            IGIR_VERSION=${{ steps.version.outputs.igir_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Test
        run: |
          set +e
          version="$(
            docker run --rm \
              --entrypoint node \
              local/igir-ci:${{ steps.version.outputs.igir_version }} \
              -p "require('/usr/local/lib/node_modules/igir/package.json').version" 2>&1
          )"
          status=$?
          set -e
          printf 'container version output: %s\n' "$version"
          test "$status" -eq 0
          test "$version" = "${{ steps.version.outputs.igir_version }}"

      - name: Set Up Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          version: latest

      - name: Trivy Filesystem Scan
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            .

      - name: Trivy Image Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            local/igir-ci:${{ steps.version.outputs.igir_version }}

      - name: Push Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.buildmeta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            IGIR_VERSION=${{ steps.version.outputs.igir_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
